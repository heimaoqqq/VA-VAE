# LightningDiT-Base配置文件 - 用于微多普勒条件生成
# 基于官方lightningdit_xl_vavae_f16d32.yaml修改
# 针对Kaggle T4x2环境和小数据集优化

# 数据配置
data:
  data_path: '/kaggle/input/microdoppler-latents/latents_train'  # 训练集潜在编码路径（step6输出）
  valid_path: '/kaggle/input/microdoppler-latents/latents_val'    # 验证集潜在编码路径（step6输出）
  
  # 官方LightningDiT关键设置
  image_size: 256        # 原始图像尺寸
  num_classes: 31        # 31个用户类别
  num_workers: 4         # 数据加载线程数
  latent_norm: false       # 关闭 - 避免重复归一化
  latent_multiplier: 0.18215  # 需要缩放到LightningDiT标准空间

# VAE配置（与微调的VA-VAE一致）
vae:
  model_name: 'vavae_f16d32'
  downsample_ratio: 16   # 256x256 -> 16x16 latent
  
# 模型配置 - LightningDiT-Base
model:
  model_type: 'LightningDiT-B/2'  # Base模型，patch_size=2
  num_classes: 31                  # 31个用户类别
  use_qknorm: false                # 官方推荐设置
  use_swiglu: true                 # SwiGLU激活函数
  use_rope: true                   # Rotary Position Embedding
  use_rmsnorm: true                # RMSNorm替代LayerNorm
  wo_shift: false                  # 使用shift
  in_chans: 32                     # VA-VAE f16d32输出32通道
  use_checkpoint: false            # Kaggle环境不使用梯度检查点

# 训练配置
train:
  # 训练规模
  max_epochs: 100                  # 增加训练轮数
  global_batch_size: 64            # GPU内存限制
  global_seed: 42                  # 随机种子
  output_dir: '/kaggle/working/output'
  exp_name: 'dit_base_microdoppler_official'
  # weight_init: null  # 从头训练，不使用预训练权重
  resume: false
  log_every: 50                    # 每50步记录一次
  ckpt_every_epoch: 10             # 每10个epoch保存checkpoint
  
  # 早停配置
  patience: 20                     # 早停耐心值
  
  # 梯度检查点（节省内存但速度慢）
  use_checkpoint: false
  
# 优化器配置 - 基于研究优化
optimizer:
  lr: 0.0002  # 官方学习率
  beta1: 0.9  # 标准动量值
  beta2: 0.95  # 官方beta2
  max_grad_norm: 1.0
  weight_decay: 0.0  # 小数据集不用权重衰减

# Transport配置（扩散过程）- 与官方完全一致
transport:
  path_type: 'Linear'              # 线性扩散路径（与官方一致）
  prediction: 'velocity'           # 预测速度（与官方一致）
  loss_weight: null                # 默认损失权重（与官方一致）
  sample_eps: null                 # 采样epsilon（与官方一致）
  train_eps: null                  # 训练epsilon（与官方一致）
  use_cosine_loss: true            # 启用cosine loss
  use_lognorm: true                # 启用lognorm

# 采样配置（用于推理）
sample:
  mode: 'ODE'                      # ODE求解模式
  sampling_method: 'dopri5'        # 高精度ODE求解器（适合时频图像）
  atol: 0.000001                   # 绝对误差容限
  rtol: 0.001                      # 相对误差容限
  reverse: false
  likelihood: false
  num_sampling_steps: 150          # 采样步数（平衡质量和速度）
  cfg_scale: 7.0                   # 适度CFG，避免过度引导丢失微动细节
  
  # 高级采样设置
  per_proc_batch_size: 4
  fid_num: 50000
  cfg_interval_start: 0.11         # CFG区间开始
  timestep_shift: 0.1              # 时间步偏移（微多普勒需要保留弱信号，不用官方0.3）

# 分布式训练配置（Kaggle T4x2）
distributed:
  backend: 'nccl'
  world_size: 2                    # 2个GPU
  find_unused_parameters: false
