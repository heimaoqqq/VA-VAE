# 基于官方lightningdit_xl_vavae_f16d32.yaml的微调配置
# 适配微多普勒数据集的条件生成训练

data:
  data_path: '/kaggle/working/latent_dataset'  # 预编码的latent数据集路径
  valid_path: '/kaggle/working/latent_dataset_val'  # 验证集（可选）
  image_size: 256  # 原始图像尺寸
  num_classes: 32  # 31个用户 + 1个无条件类别（用于CFG）
  num_workers: 4  # T4 GPU环境
  latent_norm: true  # 使用归一化
  latent_multiplier: 1.0  # VA-VAE的latent系数

# VA-VAE配置
vae:
  model_name: 'vavae_f16d32'
  downsample_ratio: 16  # 256/16 = 16x16 latent

# 模型配置 - 完全匹配官方XL模型
model:
  model_type: LightningDiT-XL/1
  use_qknorm: false
  use_swiglu: true
  use_rope: true
  use_rmsnorm: true
  wo_shift: false
  in_chans: 32  # VA-VAE f16d32的通道数
  use_checkpoint: false  # T4显存有限，不使用gradient checkpointing

# 训练配置
train:
  weight_init: '/kaggle/working/LightningDiT/checkpoints/lightningdit_xl_vavae_f16d32.pt'  # 预训练权重
  max_steps: 10000  # 微调步数
  global_batch_size: 32  # 双T4 GPU，每GPU batch_size=16
  global_seed: 42
  output_dir: '/kaggle/working/microdoppler_dit_finetune'
  exp_name: 'microdoppler_xl_finetune'
  log_every: 50
  ckpt_every: 1000
  resume: false
  use_checkpoint: false

# 优化器配置
optimizer:
  lr: 0.0001  # 微调使用较小学习率
  beta2: 0.95
  max_grad_norm: 1.0  # 梯度裁剪

# Transport配置 - 与官方保持一致
transport:
  path_type: Linear
  prediction: velocity
  loss_weight: null
  sample_eps: null
  train_eps: null
  use_cosine_loss: true
  use_lognorm: true

# 采样配置 - 针对微多普勒时频图像优化
sample:
  mode: ODE
  sampling_method: dopri5  # 更精确的ODE求解器
  atol: 0.000001
  rtol: 0.001
  reverse: false
  likelihood: false
  num_sampling_steps: 150  # 平衡质量和速度
  cfg_scale: 7.0  # 适度的CFG scale
  per_proc_batch_size: 4
  fid_num: 5000  # 评估用样本数
  cfg_interval_start: 0.11
  timestep_shift: 0.1  # 减小shift保留更多细节
